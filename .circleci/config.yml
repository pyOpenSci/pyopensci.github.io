version: 2.1

jobs:
  build:
    docker:
      - image: cimg/ruby:3.2.2
    steps:
      - checkout
      - run:
          name: Install dependencies
          working_directory: jekyll
          command: bundle install
      - run:
          name: Jekyll build
          working_directory: jekyll
          command: |
            bundle exec jekyll build --baseurl /output/job/$CIRCLE_WORKFLOW_JOB_ID/artifacts/0/_site
      - store_artifacts:
          path: jekyll/_site
          destination: _site

workflows:
  version: 2
  build:
    jobs:
      - build
