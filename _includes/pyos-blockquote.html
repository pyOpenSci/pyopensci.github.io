<blockquote
  class="highlight-quote {% if include.class %}{{ include.class }}{% endif %}"
>
  <p class="quote">{{ include.quote }}</p>
  {% if include.author or include.event %}
  <footer class="highlight-quote__cite">
    <cite>
      {%- if include.author -%}{{ include.author }}{%- endif -%}
      {%- if include.author and include.event -%}, {{ include.event }}{%- elsif include.event -%}{{ include.event }}{%- endif -%}
    </cite>
  </footer>
  {% endif %}
</blockquote>
