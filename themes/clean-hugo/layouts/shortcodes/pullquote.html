{{- $color := .Get "color" | default "teal" -}}
{{- $author := .Get "author" -}}
{{- $event := .Get "event" -}}

<figure class="pullquote pullquote--{{ $color }}">
  <p class="pullquote__text">{{ .Inner | markdownify }}</p>
  {{ if or $author $event }}
  <figcaption class="pullquote__footer">
    {{ with $author }}<strong>~ {{ . }}</strong>{{ end }}{{ with $event }}, <em>{{ . }}</em>{{ end }}
  </figcaption>
  {{ end }}
</figure>
