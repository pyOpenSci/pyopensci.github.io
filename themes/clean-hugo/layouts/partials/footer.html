<footer id="footer" class="site-footer">
  <div class="site-footer__inner">
    <div class="site-footer__follow">
      <ul class="social-icons">
        {{ range .Site.Params.footer.links }}
          <li>
            <a
              href="{{ .url }}"
              class="site-footer__social-link"
              aria-label="{{ .label }}"
              data-tooltip="{{ .label }}"
              {{ if .rel_me }}rel="nofollow noopener noreferrer me"{{ else }}rel="nofollow noopener noreferrer"{{ end }}
            >
              <i class="{{ .icon }}" aria-hidden="true"></i>
            </a>
          </li>
        {{ end }}
      </ul>
    </div>

    <div class="site-footer__copyright">
      {{ with .Site.Params.footer.mission }}
        <p class="site-footer__mission">{{ . | safeHTML }}</p>
      {{ end }}
      <p class="site-footer__copy">
        &copy; {{ now.Format "2006" }} {{ .Site.Title }}
      </p>
    </div>

    {{ if .IsHome }}
      <div class="site-footer__netlify">
        <a href="https://www.netlify.com" rel="noopener noreferrer">
          <img
            src="{{ "images/netlify-badge-dark.svg" | relURL }}"
            alt="Deploys by Netlify"
            width="80"
            height="36"
          />
        </a>
      </div>
    {{ end }}
  </div>
</footer>
